<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no"/>
  <meta name="renderer" content="webkit"/>

  <!-- 引入 mdui CSS & JS -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
  <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>

  <title>我的博客</title>

  <style>
    /* 响应式切换：屏幕宽度 < 840px 为移动端，≥ 840px 为桌面端 */
    @media (max-width: 839px) {
      .desktop-only {
        display: none !important;   /* 隐藏侧边栏 */
      }
    }
    @media (min-width: 840px) {
      .mobile-only {
        display: none !important;   /* 隐藏底部导航栏 */
      }
    }

    /* 可选：自定义博客内容样式 */
    .blog-content {
      padding: 1.5rem;
      max-width: 800px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <!-- 使用 mdui 布局系统 -->
  <mdui-layout>

    <!-- ========== 顶部应用栏（全平台显示） ========== -->
    <mdui-top-app-bar>
      <mdui-button-icon icon="menu" id="menuToggle"></mdui-button-icon>
      <mdui-top-app-bar-title>我的博客</mdui-top-app-bar-title>
      <div style="flex-grow: 1"></div>
      <mdui-button-icon icon="search"></mdui-button-icon>
      <mdui-button-icon icon="more_vert"></mdui-button-icon>
    </mdui-top-app-bar>

    <!-- ========== 桌面端侧边导航栏（仅 ≥840px 显示） ========== -->
    <mdui-navigation-drawer
      class="desktop-only"
      placement="left"
      open                           <!-- 默认打开 -->
      close-on-esc
      close-on-overlay-click
    >
      <mdui-list>
        <mdui-list-item icon="home" active>首页</mdui-list-item>
        <mdui-list-item icon="article">文章</mdui-list-item>
        <mdui-list-item icon="category">分类</mdui-list-item>
        <mdui-list-item icon="tag">标签</mdui-list-item>
        <mdui-list-item icon="person">关于</mdui-list-item>
      </mdui-list>
    </mdui-navigation-drawer>

    <!-- ========== 主内容区域 ========== -->
    <mdui-layout-main>
      <div class="blog-content">
        <h1>Hello, 世界！</h1>
        <p>这是我的个人博客，使用 mdui 构建。</p>
        <p>在移动设备上，你会看到底部导航栏；在桌面设备上，你会看到左侧的侧边导航栏。</p>
        <!-- 更多博客内容…… -->
      </div>
    </mdui-layout-main>

    <!-- ========== 移动端底部导航栏（仅 <840px 显示） ========== -->
    <mdui-navigation-bar
      class="mobile-only"
      value="home"
    >
      <mdui-navigation-bar-item icon="home--outlined" active-icon="home" value="home">首页</mdui-navigation-bar-item>
      <mdui-navigation-bar-item icon="article--outlined" active-icon="article" value="articles">文章</mdui-navigation-bar-item>
      <mdui-navigation-bar-item icon="category--outlined" active-icon="category" value="categories">分类</mdui-navigation-bar-item>
      <mdui-navigation-bar-item icon="person--outlined" active-icon="person" value="about">关于</mdui-navigation-bar-item>
    </mdui-navigation-bar>

  </mdui-layout>

  <!-- 可选：点击顶部菜单图标，在移动端打开侧边栏（作为抽屉） -->
  <script>
    document.getElementById('menuToggle').addEventListener('click', () => {
      // 只在移动端（屏幕宽度 < 840px）有效
      if (window.innerWidth < 840) {
        const drawer = document.querySelector('mdui-navigation-drawer');
        if (drawer) {
          // 切换 open 状态（通过 JavaScript 属性）
          drawer.open = !drawer.open;
        }
      }
    });
  </script>

</body>
</html>
